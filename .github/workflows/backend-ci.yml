name: Backend CI/CD

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'marifetbul-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'marifetbul-backend/**'

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx2048m

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        working-directory: ./marifetbul-backend
        run: mvn clean compile -B

      - name: Run tests
        working-directory: ./marifetbul-backend
        run: mvn test -B
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

      - name: Generate test coverage
        working-directory: ./marifetbul-backend
        run: mvn jacoco:report

      - name: Package application
        working-directory: ./marifetbul-backend
        run: mvn package -DskipTests -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: marifetbul-backend/target/*.jar
          retention-days: 5

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./marifetbul-backend
          file: ./marifetbul-backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marifetbul-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/marifetbul-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
